# Local-dev secrets template. Copy to secrets.toml (gitignored) and fill in.
# Two auth options:
#   (a) key-pair — set `private_key_path` (most reliable)
#   (b) SSO      — leave key path blank; sf.py defaults to externalbrowser auth

[snowflake]
user = "YOUR_SNOWFLAKE_USER"
account = "RE15009-STARBREEZE"
warehouse = "USER_QUERIES"
database = "PAYDAY3_PROD"
role = "SYSADMIN"
# private_key_path = "~/path/to/your_snowflake_key.p8"
